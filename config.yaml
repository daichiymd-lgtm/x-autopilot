# ============================================================
# X Autopilot 設定（ここを編集すれば挙動が変わる・コード改変不要）
# ============================================================

account:
  handle: "@daichi631056"          # 投稿先（57戦略: daichi/DC 統一人格・X主戦場）

persona_file: "data/persona.md"     # 人格・経歴正本・トーンの正典

# --- 1日5スロット（各2.5h以上の間隔）。theme=守備領域レンズ / style=形式 ---
# v2: トレンドスキャンが話題を毎回発見するため、theme は「固定テーマ」ではなく「読者レンズ」。
# time_jst は人間可読の参考値。実発火は GitHub Actions の cron（UTC）が制御。post.yml と必ず一致させること。
slots:
  morning1:
    time_jst: "08:00"              # 通勤・夜間の海外市場/AI発表が出揃う時間
    theme: "海外金融×不動産×AIの夜間〜早朝の動き。米欧アジアの金利・REIT・AI業界の発表を、日本の投資家・実務者が朝一番に知るべき形で"
    style: "【速報】箇条書き型。見出し＋3〜5個の箇条書きで1トピック完結。事実・数字→『日本にこう効く』の一次解釈。締めは読者への問い。"
  morning2:
    time_jst: "12:30"              # 昼休み。サッと読めて反応したくなる1点
    theme: "AI実務・副業・効率化／不動産×テック。昼休みの読者が『これ使える』と保存したくなる実用ネタ"
    style: "コンパクトスレッド（3〜4）。手順・ツール・判断基準を具体的に。逆張りか二択の問いで締める。一般論で始めない。"
  afternoon1:
    time_jst: "17:00"              # 夕方。仕事の締めに引っかかる保存ネタ
    theme: "金融×不動産×AIの『保存版』になる知識。制度・税・融資・ツール比較など、後で見返す価値があるもの"
    style: "保存版チェックリスト/手順ガイド型スレッド（4〜5）。番号付き手順か判断基準リストを必ず含める。ブックマーク誘発が最優先。"
  evening1:
    time_jst: "19:30"              # 帰宅時間
    theme: "海外で先行するAI×金融/不動産の実務手法・ワークフロー・事例を、日本の現場で今日から使える形に落とす"
    style: "スレッド（4〜5）。海外事実→分析→日本での使い方。1ツイート1論点。連番。締めは問いでリプ誘発。"
  evening2:
    time_jst: "22:00"              # 夜ゴールデンタイム＝主砲。最も深い保存版をここに
    theme: "今日いちばん示唆深い金融×不動産×AIのトピックを1つ深掘り。背景→何が起きた→日本への含意→読者のアクション"
    style: "本命スレッド（4〜6）。最も深い知見・保存版フレームワーク。ブックマークされる情報密度を狙う。締めは強い問いでリプを誘発。"

# --- スレッド（ツリー）構造 ---
thread:
  min_tweets: 3
  max_tweets: 6
  max_chars_per_tweet: 270          # 280上限に余白。全角=2扱いではなくXは概ね文字数だが安全側で270
  number_tweets: true               # 「1/」「2/」等の連番を付ける（読了率向上）
  cta_self_reply: true              # 本文にURLを貼らずセルフリプにCTA（デブースト回避・57運用ルール）
  cta_text: |-
    ▼ 実務の手順・数字の詳細はnoteで深掘りしています
    https://note.com/daichi9567

# --- 収集層（Grok web_search・3段収集） ---
collect:
  grok_model: "grok-4.3"             # Responses API + web_search tool 対応（2026-06移行）
  trend_scan: true                   # true=トレンド起点で話題を発見（v2）。false=旧来の固定テーマ収集
  research_passes: 2                 # 深掘りリサーチのパス数（A=事実数字 / B=実務含意）
  recency_hours: 36                 # フォールバック収集時の鮮度

# --- 品質ゲート（おっさんのつぶやき排除） ---
quality:
  enabled: true
  min_score: 7                       # 有用性ルーブリック10点満点の合格ライン
  max_regenerate: 2                  # 品質不合格時の再生成回数（超えたらスロットをスキップ＝質を守る）

# --- 分析・生成層（Claude） ---
analyze:
  hook_model: "claude-opus-4-8"               # フック（1ツイート目）専用。全ツイートの印象を決める最重要箇所
  compose_model: "claude-sonnet-4-6"          # 本文ツイート（2〜N）生成。hook_model と同じ値にすると従来のシングルコールにフォールバック
  translate_model: "claude-haiku-4-5-20251001" # 海外原文の一次翻訳（安価）

# --- 自動安全ゲート（完全自動なので必須） ---
gates:
  ng_words:                          # 経歴正本(53)・スタイルガイド違反語＝即ブロック
    - "コンサル8年"
    - "コンサルタント8年"
    - "社内最優秀賞"
    - "最優秀賞"
    - "東京センチュリー"
    - "大和ハウス"
    - "KJR"
    - "年商1000億"
    - "年商１０００億"
    - "実装家"
  block_investment_advice: true      # 個別銘柄推奨・断定的売買助言を禁止（Daichi-Fund原則: AIは推薦しない）
  advice_risk_words:                 # 検知したら免責付与 or 表現を中立化
    - "必ず儲かる"
    - "絶対に上がる"
    - "今すぐ買い"
    - "買い推奨"
    - "おすすめ銘柄"
    - "確実に"
  finance_disclaimer: "※投資判断は自己責任で。本投稿は情報提供であり特定銘柄の売買推奨ではありません。"
  require_pr_on_promo: true          # 宣伝/アフィリ要素があれば PR表記（ステマ規制）
  dedup_days: 30                     # 過去N日と似たトピックは再投稿しない
  dedup_similarity: 0.62             # Jaccard類似度しきい値
  max_regenerate: 1                  # ゲート不合格時の再生成回数

# --- 投稿層 ---
publish:
  enabled: true                      # false = ドライラン（生成のみ・投稿しない）
  mode: "direct"                     # direct=即投稿 / buffer=Slack予告30分後 / draft=下書き配信のみ
  buffer_minutes: 30                 # mode=buffer のときの予告猶予

# --- 通知 ---
notify:
  slack_enabled: true                # SLACK_BOT_TOKEN があれば通知。無ければ自動でスキップ
  on_success: true                   # 投稿成功も通知（うるさければ false）
  on_error: true

# --- 学習層 ---
learn:
  guidance_file: "data/guidance.json"
  pull_engagement: true              # 週次でインプレ/いいねを取得し指針更新
